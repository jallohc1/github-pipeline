name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
  VAULT_JFROG_PATH: secret/data/creds/jfrog
  JFROG_URL: ${{ secrets.JFROG_URL }}
  JFROG_REPO: devops-project
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}

jobs:
  build:
    name: Checkout and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile and package with Maven
        run: mvn clean package -DskipTests

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: target/surefire-reports/

 quality-gate:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Debug Sonar config
        run: |
          echo "org=[$SONAR_ORGANIZATION]"
          echo "key=[$SONAR_PROJECT_KEY]"
          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN IS EMPTY"
          else
            echo "SONAR_TOKEN is set, length: ${#SONAR_TOKEN}"
          fi

      - name: Run SonarCloud analysis and Quality Gate
        run: |
          mvn verify sonar:sonar \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.qualitygate.wait=true

  vulnerability-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: vulnerability-scan
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build the application jar
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

  image-scan:
    name: Trivy Docker Image Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build the application jar
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'image'
          image-ref: 'my-app:${{ github.sha }}'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  publish:
    name: Publish to JFrog and ECR
    runs-on: ubuntu-latest
    needs: image-scan
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build the application jar
        run: mvn clean package -DskipTests

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Read JFrog credentials from Vault (AppRole)
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: approle
          roleId: ${{ env.VAULT_ROLE_ID }}
          secretId: ${{ env.VAULT_SECRET_ID }}
          secrets: |
            ${{ env.VAULT_JFROG_PATH }} JFROG_USER  | JFROG_USER ;
            ${{ env.VAULT_JFROG_PATH }} JFROG_TOKEN | JFROG_TOKEN

      - name: Log in to JFrog Artifactory
        run: |
          echo "$JFROG_TOKEN" | docker login "$JFROG_URL" \
            -u "$JFROG_USER" --password-stdin

      - name: Push the image to JFrog
        run: |
          docker tag my-app:${{ github.sha }} \
            $JFROG_URL/$JFROG_REPO/my-app:${{ github.sha }}
          docker push $JFROG_URL/$JFROG_REPO/my-app:${{ github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push the image to ECR
        run: |
          docker tag my-app:${{ github.sha }} \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          docker tag my-app:${{ github.sha }} \
            ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:latest
          docker push ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
          docker push ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:latest

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force a new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment

      - name: Wait for the service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"